name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: "34.0.0"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/majsoul-tiles.p12
          echo "keystore decoded: $(wc -c < /tmp/majsoul-tiles.p12) bytes"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/
            /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          fi

      - name: Build Debug APK (fixed signature)
        env:
          KEYSTORE_PATH: /tmp/majsoul-tiles.p12
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: majsoul-tiles-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
